# Optional: publish browser preview to GitHub Pages. Does NOT run on every push — start it manually.
# Actions → Web preview (GitHub Pages) → Run workflow.
# Repo Settings → Pages → Source: GitHub Actions.
name: Web preview (GitHub Pages)

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'tools platform-tools platforms;android-35 build-tools;35.0.0'
          log-accepted-android-sdk-licenses: false

      - name: Gradle jsBrowserProductionWebpack
        working-directory: android
        run: chmod +x gradlew && ./gradlew :shared:jsBrowserProductionWebpack --no-daemon --stacktrace

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: android/shared/build/dist/js/productionExecutable

  deploy-pages:
    needs: build-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
