# Optional: publish browser preview to GitHub Pages. Does NOT run on every push — start it manually.
# Actions → Web preview (GitHub Pages) → Run workflow.
# Repo Settings → Pages → Source: GitHub Actions.
name: Web preview (GitHub Pages)

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'tools platform-tools platforms;android-35 build-tools;35.0.0'
          log-accepted-android-sdk-licenses: false

      - name: Gradle jsBrowserProductionWebpack
        working-directory: android
        run: chmod +x gradlew && ./gradlew :shared:jsBrowserProductionWebpack --no-daemon --stacktrace

      # KGP may write to dist/pages, dist/js/productionExecutable, or elsewhere — do not hardcode one path.
      - name: Locate webpack output for Pages
        id: site
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"
          for d in android/shared/build/dist/pages android/shared/build/dist/js/productionExecutable; do
            if [ -f "$d/yetris.js" ]; then
              echo "pages_path=$d" >> "$GITHUB_OUTPUT"
              echo "Found bundle at $d"; ls -la "$d"
              exit 0
            fi
          done
          HIT=$(find android/shared/build -type f -name 'yetris.js' ! -path '*/node_modules/*' 2>/dev/null | head -1 || true)
          if [ -z "$HIT" ]; then
            echo "yetris.js not found. Tree under android/shared/build:"
            find android/shared/build -type d 2>/dev/null | head -60 || true
            find android/shared/build -type f -name '*.html' 2>/dev/null | head -20 || true
            exit 1
          fi
          SITE=$(dirname "$HIT")
          echo "pages_path=$SITE" >> "$GITHUB_OUTPUT"
          echo "Found bundle at $SITE"; ls -la "$SITE"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.site.outputs.pages_path }}

  deploy-pages:
    needs: build-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
