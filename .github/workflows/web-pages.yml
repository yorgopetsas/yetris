# Optional: publish browser preview to GitHub Pages. Does NOT run on every push — start it manually.
# Actions → Web preview (GitHub Pages) → Run workflow.
# Repo Settings → Pages → Source: GitHub Actions.
name: Web preview (GitHub Pages)

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'tools platform-tools platforms;android-35 build-tools;35.0.0'
          log-accepted-android-sdk-licenses: false

      - name: Gradle jsBrowserProductionWebpack
        working-directory: android
        run: chmod +x gradlew && ./gradlew :shared:jsBrowserProductionWebpack --no-daemon --stacktrace

      # Pick a directory that contains yetris.js; ensure index.html exists (GitHub Pages requires it at site root).
      - name: Locate webpack output for Pages
        id: site
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"
          echo "Workflow ref: ${GITHUB_SHA}"

          SITE=""
          for zone in android/shared/build/dist android/shared/build; do
            if [ -d "$zone" ]; then
              while IFS= read -r f; do
                [ -z "$f" ] && continue
                d=$(dirname "$f")
                if [ -f "$d/yetris.js" ]; then
                  if [ -f "$d/index.html" ]; then SITE="$d"; break 2; fi
                  [ -z "$SITE" ] && SITE="$d"
                fi
              done < <(find "$zone" -type f -name 'yetris.js' ! -path '*/node_modules/*' 2>/dev/null || true)
            fi
          done

          if [ -z "$SITE" ]; then
            echo "yetris.js not found under android/shared/build"
            find android/shared/build -type f -name '*.js' 2>/dev/null | head -30 || true
            exit 1
          fi

          if [ ! -f "$SITE/index.html" ]; then
            echo "No index.html next to yetris.js; copying from jsMain resources"
            cp android/shared/src/jsMain/resources/index.html "$SITE/index.html"
          fi

          ls -la "$SITE"
          test -f "$SITE/index.html"
          test -f "$SITE/yetris.js"
          echo "pages_path=$SITE" >> "$GITHUB_OUTPUT"
          echo "Using bundle directory: $SITE"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.site.outputs.pages_path }}

  deploy-pages:
    needs: build-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
