# Builds Kotlin/JS from :shared and deploys static files to GitHub Pages.
# Repo Settings → Pages → Build and deployment → Source: GitHub Actions.
name: Deploy web preview (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - 'android/shared/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Gradle jsBrowserProductionWebpack
        working-directory: android
        run: chmod +x gradlew && ./gradlew :shared:jsBrowserProductionWebpack --no-daemon --stacktrace

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: android/shared/build/dist/js/productionExecutable

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
